<!--
  MTG Packing Slip Organizer — WordPress Embed

  Paste this into a Custom HTML block on any WordPress page.
  Replace YOUR_API_URL below with your deployed API URL, e.g.:
    https://mtg-organizer.onrender.com
-->

<div id="mtg-organizer">
  <style>
    #mtg-organizer {
      max-width: 600px;
      margin: 0 auto;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #mtg-organizer .file-slots {
      display: flex; gap: 10px;
    }
    #mtg-organizer .file-slot {
      flex: 1; border: 2px dashed #999; border-radius: 12px;
      padding: 20px 10px; text-align: center; cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      background: #f9f9f9; position: relative;
      min-height: 80px; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
    }
    #mtg-organizer .file-slot:hover {
      border-color: #6c63ff; background: #f0eeff;
    }
    #mtg-organizer .file-slot.filled {
      border-style: solid; background: #f0eeff;
    }
    #mtg-organizer .file-slot.filled .slot-label { display: none; }
    #mtg-organizer .file-slot:not(.filled) .slot-file,
    #mtg-organizer .file-slot:not(.filled) .slot-remove { display: none; }
    #mtg-organizer .file-slot input { display: none; }
    #mtg-organizer .slot-label { font-size: 0.85em; color: #888; }
    #mtg-organizer .slot-file {
      font-size: 0.8em; color: #6c63ff; word-break: break-all; font-weight: 600;
    }
    #mtg-organizer .slot-remove {
      position: absolute; top: 4px; right: 6px;
      color: #999; font-size: 1.1em; cursor: pointer;
      width: 20px; height: 20px; display: flex;
      align-items: center; justify-content: center;
      border-radius: 50%; transition: background 0.2s;
    }
    #mtg-organizer .slot-remove:hover { background: #eee; color: #d32f2f; }
    #mtg-organizer .slot-group {
      position: absolute; bottom: 4px; right: 6px;
      font-size: 0.65em; font-weight: 700;
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    #mtg-organizer .file-slot:nth-child(1) .slot-group { background: rgba(74,158,255,0.2); color: #4a9eff; }
    #mtg-organizer .file-slot:nth-child(2) .slot-group { background: rgba(255,152,0,0.2); color: #ff9800; }
    #mtg-organizer .file-slot:nth-child(3) .slot-group { background: rgba(102,187,106,0.2); color: #66bb6a; }
    #mtg-organizer .file-slot:not(.filled) .slot-group { display: none; }
    #mtg-organizer .slot-hint {
      font-size: 0.75em; color: #aaa; margin-top: 8px; text-align: center;
    }
    #mtg-organizer button {
      display: block;
      margin: 20px auto 0;
      padding: 12px 40px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: background 0.2s;
    }
    #mtg-organizer button:hover { background: #5a52d5; }
    #mtg-organizer button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    #mtg-organizer .status {
      text-align: center;
      margin-top: 15px;
      color: #666;
      min-height: 1.5em;
    }
    #mtg-organizer .status.error { color: #d32f2f; }
    #mtg-organizer .status.success { color: #2e7d32; }

    #mtg-organizer .processing { display: none; margin-top: 20px; }
    #mtg-organizer .processing.active { display: block; }
    #mtg-organizer .proc-bar-wrap {
      background: #e0e0e0; border-radius: 6px; height: 24px;
      overflow: hidden; position: relative;
    }
    #mtg-organizer .proc-bar-fill {
      background: linear-gradient(90deg, #6c63ff, #48c6ef);
      height: 100%; width: 0%; transition: width 0.3s;
      border-radius: 6px;
    }
    #mtg-organizer .proc-bar-text {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8em; color: #fff; font-weight: 600;
    }
    #mtg-organizer .proc-detail {
      margin-top: 8px; font-size: 0.85em; color: #888;
      text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
  </style>

  <div class="file-slots" id="mtgFileSlots">
    <div class="file-slot" id="mtgSlot0" onclick="mtgAddFile(0)">
      <input type="file" accept=".pdf" onchange="mtgHandleSlotFile(0, this)">
      <div class="slot-label">PDF 1</div>
      <div class="slot-file"></div>
      <div class="slot-remove" onclick="mtgRemoveFile(event, 0)">&times;</div>
      <div class="slot-group">A</div>
    </div>
    <div class="file-slot" id="mtgSlot1" onclick="mtgAddFile(1)">
      <input type="file" accept=".pdf" onchange="mtgHandleSlotFile(1, this)">
      <div class="slot-label">PDF 2</div>
      <div class="slot-file"></div>
      <div class="slot-remove" onclick="mtgRemoveFile(event, 1)">&times;</div>
      <div class="slot-group">B</div>
    </div>
    <div class="file-slot" id="mtgSlot2" onclick="mtgAddFile(2)">
      <input type="file" accept=".pdf" onchange="mtgHandleSlotFile(2, this)">
      <div class="slot-label">PDF 3</div>
      <div class="slot-file"></div>
      <div class="slot-remove" onclick="mtgRemoveFile(event, 2)">&times;</div>
      <div class="slot-group">C</div>
    </div>
  </div>
  <div class="slot-hint">Upload 1 PDF or up to 3 for a multi-order pull sheet</div>

  <button id="mtgSubmitBtn" disabled>Generate Pull Sheet</button>

  <div class="processing" id="mtgProcessing">
    <div class="proc-bar-wrap">
      <div class="proc-bar-fill" id="mtgProcFill"></div>
      <div class="proc-bar-text" id="mtgProcText">Starting...</div>
    </div>
    <div class="proc-detail" id="mtgProcDetail"></div>
  </div>

  <div class="status" id="mtgStatus"></div>
</div>

<script>
(function() {
  // ============================================================
  // CHANGE THIS to your deployed API URL (no trailing slash)
  const API_URL = 'https://tcgplayer-order-report.onrender.com';
  // ============================================================

  const submitBtn = document.getElementById('mtgSubmitBtn');
  const status = document.getElementById('mtgStatus');
  const processing = document.getElementById('mtgProcessing');
  const procFill = document.getElementById('mtgProcFill');
  const procText = document.getElementById('mtgProcText');
  const procDetail = document.getElementById('mtgProcDetail');

  const mtgSlotFiles = [null, null, null];

  function mtgAddFile(idx) {
    document.getElementById('mtgSlot' + idx).querySelector('input').click();
  }

  function mtgHandleSlotFile(idx, input) {
    const file = input.files[0];
    if (!file) return;
    if (!file.name.toLowerCase().endsWith('.pdf')) {
      status.textContent = 'Please select a PDF file.';
      status.className = 'status error';
      return;
    }
    mtgSlotFiles[idx] = file;
    const slot = document.getElementById('mtgSlot' + idx);
    slot.classList.add('filled');
    slot.querySelector('.slot-file').textContent = file.name;
    status.textContent = '';
    status.className = 'status';
    submitBtn.disabled = !mtgSlotFiles.some(f => f !== null);
  }

  function mtgRemoveFile(e, idx) {
    e.stopPropagation();
    mtgSlotFiles[idx] = null;
    const slot = document.getElementById('mtgSlot' + idx);
    slot.classList.remove('filled');
    slot.querySelector('.slot-file').textContent = '';
    slot.querySelector('input').value = '';
    submitBtn.disabled = !mtgSlotFiles.some(f => f !== null);
  }

  // Drag and drop on individual slots
  document.querySelectorAll('#mtg-organizer .file-slot').forEach((slot, idx) => {
    slot.addEventListener('dragover', e => { e.preventDefault(); slot.style.borderColor = '#6c63ff'; });
    slot.addEventListener('dragleave', () => { slot.style.borderColor = ''; });
    slot.addEventListener('drop', e => {
      e.preventDefault();
      slot.style.borderColor = '';
      if (e.dataTransfer.files.length) {
        const input = slot.querySelector('input');
        input.files = e.dataTransfer.files;
        mtgHandleSlotFile(idx, input);
      }
    });
  });

  submitBtn.addEventListener('click', async () => {
    const activeFiles = mtgSlotFiles.filter(f => f !== null);
    if (!activeFiles.length) return;
    submitBtn.disabled = true;
    status.textContent = '';
    status.className = 'status';

    processing.classList.add('active');
    procFill.style.width = '0%';
    procText.textContent = activeFiles.length > 1 ? 'Uploading PDFs...' : 'Uploading PDF...';
    procDetail.textContent = '';

    const form = new FormData();
    activeFiles.forEach(f => form.append('files', f));
    let jobId;

    try {
      const uploadRes = await fetch(API_URL + '/api/parse', { method: 'POST', body: form });
      if (!uploadRes.ok) {
        const err = await uploadRes.json();
        throw new Error(err.detail || 'Upload failed');
      }
      const uploadData = await uploadRes.json();
      jobId = uploadData.job_id;
      procText.textContent = `Parsing PDF (${uploadData.card_count} cards)...`;
      procDetail.textContent = 'Looking up card data on Scryfall...';
    } catch (e) {
      processing.classList.remove('active');
      status.textContent = e.message;
      status.className = 'status error';
      submitBtn.disabled = false;
      return;
    }

    try {
      const evtSource = new EventSource(API_URL + `/api/parse/${jobId}/progress`);

      evtSource.addEventListener('progress', (e) => {
        const d = JSON.parse(e.data);
        const pct = Math.round((d.current / d.total) * 100);
        procFill.style.width = pct + '%';
        procText.textContent = `Looking up cards: ${d.current} / ${d.total}`;
        procDetail.textContent = `${d.card_name} — ${d.status}`;
      });

      evtSource.addEventListener('complete', (e) => {
        evtSource.close();
        const d = JSON.parse(e.data);
        procFill.style.width = '100%';
        procText.textContent = 'Done!';
        procDetail.textContent = 'Opening pull sheet...';

        const blob = new Blob([d.html], { type: 'text/html' });
        window.open(URL.createObjectURL(blob), '_blank');

        setTimeout(() => {
          processing.classList.remove('active');
          status.textContent = 'Pull sheet opened in a new tab.';
          status.className = 'status success';
          submitBtn.disabled = false;
        }, 800);
      });

      evtSource.addEventListener('error_event', (e) => {
        evtSource.close();
        const d = JSON.parse(e.data);
        processing.classList.remove('active');
        status.textContent = d.detail || 'Processing failed';
        status.className = 'status error';
        submitBtn.disabled = false;
      });

      evtSource.onerror = () => {
        evtSource.close();
        processing.classList.remove('active');
        status.textContent = 'Connection lost during processing.';
        status.className = 'status error';
        submitBtn.disabled = false;
      };
    } catch (e) {
      processing.classList.remove('active');
      status.textContent = e.message;
      status.className = 'status error';
      submitBtn.disabled = false;
    }
  });
})();
</script>
